  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0b0b0b;
      color: #ffffff;
      padding: 20px;
      box-sizing: border-box;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      margin-top: 20px;
    }

    header h1 {
      font-size: 36px;
      color: #ff4757;
      margin: 0 0 15px 0;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(255, 71, 87, 0.3);
    }

    .search-container {
      max-width: 500px;
      margin: 0 auto;
    }

    #searchBar {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      background-color: #1e1e1e;
      color: white;
      font-size: 16px;
      outline: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    /* Video Player Section */
    .player-section {
      max-width: 900px;
      margin: 30px auto;
      display: none;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      background-color: #000;
      border-radius: 8px;
      overflow: hidden;
    }

    .video-wrapper video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .controls-container {
      margin-top: 15px;
      display: flex;
      gap: 15px;
      background-color: #141414;
      padding: 15px;
      border-radius: 8px;
      flex-wrap: wrap;
    }

    select {
      padding: 10px 15px;
      background-color: #222;
      color: white;
      border: 1px solid #333;
      border-radius: 5px;
      cursor: pointer;
      flex: 1;
      min-width: 150px;
    }

    /* Anime Grid */
    .main-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 30px;
    }

    .anime-card {
      background-color: #141414;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .anime-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(255, 71, 87, 0.2);
    }

    .anime-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }

    .anime-info {
      padding: 15px;
    }

    .anime-info h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .anime-info p {
      margin: 0;
      font-size: 14px;
      color: #888;
    }
  </style>

    let currentAnime = "";
    const player = document.getElementById('videoPlayer');

    function displayAnime(data) {
      const grid = document.getElementById('animeGrid');
      grid.innerHTML = '';
      for (let animeName in data) {
        const anime = data[animeName];
        const card = document.createElement('div');
        card.className = 'anime-card';
        card.innerHTML = `
          <img src="${anime.info.poster}" alt="${animeName}" onerror="this.src='https://via.placeholder.com/200x280?text=${encodeURIComponent(animeName)}'">
          <div class="anime-info">
            <h3>${animeName}</h3>
            <p>Rating: ⭐ ${anime.info.rating}</p>
          </div>
        `;
        card.addEventListener('click', () => loadAnimeToPlayer(animeName));
        grid.appendChild(card);
      }
    }

    function loadAnimeToPlayer(animeName) {
      currentAnime = animeName;
      document.getElementById('playingTitle').innerText = `Now Playing: ${animeName}`;
      document.getElementById('playerSection').style.display = 'block';
      window.scrollTo({ top: document.getElementById('playerSection').offsetTop - 20, behavior: 'smooth' });
      const seasons = Object.keys(animeData[animeName]).filter(key => key !== 'info');
      const seasonSelect = document.getElementById('seasonSelect');
      
      seasonSelect.innerHTML = '';
      seasons.forEach(season => {
        seasonSelect.innerHTML += `<option value="${season}">${season}</option>`;
      });
      updateLanguages();
    }

    function updateLanguages() {
      const seasonSelect = document.getElementById('seasonSelect').value;
      const languages = Object.keys(animeData[currentAnime][seasonSelect]);
      const languageSelect = document.getElementById('languageSelect');

      languageSelect.innerHTML = '';
      languages.forEach(lang => {
        languageSelect.innerHTML += `<option value="${lang}">${lang}</option>`;
      });
      updateEpisodes();
    }

    function updateEpisodes() {
      const seasonSelect = document.getElementById('seasonSelect').value;
      const languageSelect = document.getElementById('languageSelect').value;
      const episodes = Object.keys(animeData[currentAnime][seasonSelect][languageSelect]);
      const episodeSelect = document.getElementById('episodeSelect');

      episodeSelect.innerHTML = '';
      episodes.forEach(ep => {
        episodeSelect.innerHTML += `<option value="${ep}">${ep}</option>`;
      });
      playVideo();
    }

    function playVideo() {
      const seasonSelect = document.getElementById('seasonSelect').value;
      const languageSelect = document.getElementById('languageSelect').value;
      const episodeSelect = document.getElementById('episodeSelect').value;
      
      let videoUrl = animeData[currentAnime][seasonSelect][languageSelect][episodeSelect];
      
      if (typeof videoUrl === 'object' && videoUrl !== null) {
          videoUrl = videoUrl["720p"] || videoUrl["1080p"] || videoUrl["480p"];
      }

      if(videoUrl && videoUrl !== "link") {
        player.src = videoUrl;
        player.load();
      } else {
        player.src = "";
        alert("This episode link is just a placeholder ('link')! Please add real links in the code.");
      }
    }

    // --- SEQUENTIAL AD ROTATION SYSTEM ---
    function launchAd() {
      if(adsterraUrls.length > 0) {
        const currentAdUrl = adsterraUrls[currentAdIndex];
        
        if(currentAdUrl && !currentAdUrl.includes("YOUR_ADSTERRA_DIRECT_LINK")) {
          window.open(currentAdUrl, '_blank');
        }
        
        currentAdIndex = (currentAdIndex + 1) % adsterraUrls.length;
      }
    }

    player.addEventListener('play', () => {
      launchAd();
      
      if(!adTimer) {
        adTimer = setInterval(() => {
          launchAd();
        }, 10 * 60 * 1000); // 10 minutes loop
      }
    });

    player.addEventListener('pause', () => {
      clearInterval(adTimer);
      adTimer = null;
    });

    player.addEventListener('ended', () => {
      clearInterval(adTimer);
      adTimer = null;
    });

    document.getElementById('seasonSelect').addEventListener('change', updateLanguages);
    document.getElementById('languageSelect').addEventListener('change', updateEpisodes);
    document.getElementById('episodeSelect').addEventListener('change', playVideo);
    document.getElementById('searchBar').addEventListener('input', (e) => {
      const searchTxt = e.target.value.toLowerCase();
      const filteredData = {};
      
      for (let name in animeData) {
        if (name.toLowerCase().includes(searchTxt)) {
          filteredData[name] = animeData[name];
        }
      }
      displayAnime(filteredData);
    });
    window.onload = () => {
      displayAnime(animeData);
    };
  </script>
